version: "2"

linters:
  default: none
  enable:
    - errcheck
    - ineffassign
    - staticcheck
    - unused
    - govet
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
        - (io.Writer).Write
    staticcheck:
      checks: ["all", "-SA9003"]
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: test/
        linters:
          - errcheck

run:
  timeout: 5m
  tests: true

output:
  formats:
    text: {}
